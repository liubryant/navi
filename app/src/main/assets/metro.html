<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>世界地铁线路图</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #subway-container {
            width: 100%;
            height: 100%;
        }
        #city-picker {
            display: none;
        }
        #city-picker option {
            color: #000;
            text-align: center;
        }
        #loading {
            position: absolute;
            left: 16px;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
    <script src="https://api.map.baidu.com/api?type=subway&v=1.0&ak=ekdfUl7kfYptiR4tiW1yKeFynpfIwSPR"></script>
</head>
<body>
<div id="subway-container"></div>
<select id="city-picker"></select>
<div id="loading">世界地铁线路图加载中...</div>
<script>
    (function () {
        function stripSuffix(name) {
            return (name || "").replace(/(市|自治区|特别行政区|省)$/g, "");
        }

        function init() {
            if (!window.BMapSub || !BMapSub.Subway || !BMapSub.SubwayCitiesList) {
                document.getElementById("loading").innerText = "地铁线路图加载失败，请检查网络";
                return;
            }

            var preferredName = stripSuffix("深圳");
            var fallbackName = "深圳";
            var cities = BMapSub.SubwayCitiesList || [];
            var picker = document.getElementById("city-picker");
            var matchedCode = null;
            var fallbackCode = null;
            var subway = null;

            cities.forEach(function (city) {
                var code = city.cityCode || city.citycode;
                var name = city.name || "";
                if (!code || !name) return;

                var option = document.createElement("option");
                option.value = code;
                option.text = name;
                picker.appendChild(option);

                var shortName = stripSuffix(name);
                if (!matchedCode && (shortName === preferredName || name === preferredName)) {
                    matchedCode = code;
                }
                if (!fallbackCode && (shortName === fallbackName || name === fallbackName)) {
                    fallbackCode = code;
                }
            });

            if (window.AndroidCityBridge && window.AndroidCityBridge.onCitiesLoaded) {
                var cityNames = [];
                for (var i = 0; i < picker.options.length; i++) {
                    cityNames.push(picker.options[i].text);
                }
                window.AndroidCityBridge.onCitiesLoaded(JSON.stringify(cityNames));
            }

            var initialCode = matchedCode || fallbackCode || (picker.options.length > 0 ? picker.options[0].value : null);
            if (!initialCode) {
                document.getElementById("loading").innerText = "暂无可用地铁城市数据";
                return;
            }

            document.getElementById("loading").style.display = "none";
            subway = new BMapSub.Subway("subway-container", initialCode);
            subway.setZoom(0.5);
            picker.value = initialCode;
            picker.addEventListener("change", function () {
                subway.setCity(picker.value);
                subway.setZoom(0.5);
            });

            window.setSubwayCityByName = function (cityName) {
                var target = stripSuffix(cityName);
                for (var i = 0; i < picker.options.length; i++) {
                    var option = picker.options[i];
                    if (stripSuffix(option.text) === target || option.text === cityName) {
                        picker.value = option.value;
                        subway.setCity(option.value);
                        subway.setZoom(0.5);
                        return true;
                    }
                }
                return false;
            };
        }

        if (document.readyState === "complete") {
            init();
        } else {
            window.onload = init;
        }
    })();
</script>
</body>
</html>
